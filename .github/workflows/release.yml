name: Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '3e5b8de5f6ebe844bee9d9eba0aed35c652e3c9c'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Windows
        shell: pwsh
        run: .\build.ps1 -Config Release

      - name: Smoke test Windows binaries
        shell: pwsh
        run: |
          .\dist\ZeriEngine.exe --help > $null 2>&1 ; if ($LASTEXITCODE -ne 0) { Write-Host "ZeriEngine --help returned $LASTEXITCODE" }
          .\dist\zeri.exe --help > $null 2>&1 ; if ($LASTEXITCODE -ne 0) { Write-Host "zeri --help returned $LASTEXITCODE" }

      - name: Crea archivio Windows
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath zeri-windows-amd64.zip

      - name: Upload artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: zeri-windows-amd64
          path: zeri-windows-amd64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa dipendenze sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl zip unzip tar

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '3e5b8de5f6ebe844bee9d9eba0aed35c652e3c9c'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Linux
        run: bash build.sh Release

      - name: Smoke test Linux binaries
        run: |
          chmod +x dist/ZeriEngine dist/zeri
          ./dist/ZeriEngine --help >/dev/null 2>&1 || true
          ./dist/zeri --help >/dev/null 2>&1 || true

      - name: Crea archivio Linux
        run: tar -czf zeri-linux-amd64.tar.gz -C dist .

      - name: Upload artifact Linux
        uses: actions/upload-artifact@v4
        with:
          name: zeri-linux-amd64
          path: zeri-linux-amd64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa dipendenze sistema
        run: |
          brew install cmake ninja

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '3e5b8de5f6ebe844bee9d9eba0aed35c652e3c9c'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build macOS (Apple Silicon)
        run: |
          export CMAKE_OSX_ARCHITECTURES=arm64
          bash build.sh Release

      - name: Smoke test macOS binaries
        run: |
          chmod +x dist/ZeriEngine dist/zeri
          ./dist/ZeriEngine --help >/dev/null 2>&1 || true
          ./dist/zeri --help >/dev/null 2>&1 || true

      - name: Crea archivio macOS
        run: tar -czf zeri-macos-arm64.tar.gz -C dist .

      - name: Upload artifact macOS
        uses: actions/upload-artifact@v4
        with:
          name: zeri-macos-arm64
          path: zeri-macos-arm64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download tutti gli artifacts
        uses: actions/download-artifact@v4

      - name: Crea GitHub Release con tutti i binari
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zeri-windows-amd64/zeri-windows-amd64.zip
            zeri-linux-amd64/zeri-linux-amd64.tar.gz
            zeri-macos-arm64/zeri-macos-arm64.tar.gz
          generate_release_notes: true
