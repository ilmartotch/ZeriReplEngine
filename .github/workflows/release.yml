name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-amd64
            os: windows-latest
            artifact_name: zeri-windows-amd64
            archive_name: zeri-windows-amd64.zip
            compiler_launcher: sccache
          - label: linux-amd64
            os: ubuntu-latest
            artifact_name: zeri-linux-amd64
            archive_name: zeri-linux-amd64.tar.gz
            compiler_launcher: ccache
          - label: macos-arm64
            os: macos-latest
            artifact_name: zeri-macos-arm64
            archive_name: zeri-macos-arm64.tar.gz
            compiler_launcher: ccache
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.compiler_launcher }}
      CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.compiler_launcher }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          fetch-depth: 1
          persist-credentials: false

      - name: Restore vcpkg cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-cache
            ${{ github.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'CMakeLists.txt', '.gitmodules') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: '1.25.0'
          cache-dependency-path: ui/go.sum

      - name: Validate help catalog encoding and JSON
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $path = Join-Path $env:GITHUB_WORKSPACE "help/help_catalog.json"
          if (-not (Test-Path $path)) {
            throw "Missing required file: $path"
          }

          $bytes = [System.IO.File]::ReadAllBytes($path)
          if ($bytes.Length -eq 0) {
            throw "help/help_catalog.json is empty."
          }

          if ($bytes.Length -ge 2) {
            $isUtf16Le = $bytes[0] -eq 0xFF -and $bytes[1] -eq 0xFE
            $isUtf16Be = $bytes[0] -eq 0xFE -and $bytes[1] -eq 0xFF
            if ($isUtf16Le -or $isUtf16Be) {
              throw "help/help_catalog.json must be UTF-8. UTF-16 BOM detected."
            }
          }

          if ($bytes -contains 0) {
            throw "help/help_catalog.json contains NUL bytes. Expected UTF-8 text JSON."
          }

          $utf8 = [System.Text.UTF8Encoding]::new($false, $true)
          try {
            $text = $utf8.GetString($bytes)
          } catch {
            throw "help/help_catalog.json is not valid UTF-8: $($_.Exception.Message)"
          }

          try {
            $null = $text | ConvertFrom-Json -Depth 100
          } catch {
            throw "help/help_catalog.json is not valid JSON: $($_.Exception.Message)"
          }

      - name: Validate tracked Go files are non-empty
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $emptyFiles = git ls-files "*.go" | Where-Object { (Get-Item $_).Length -eq 0 }
          if ($emptyFiles) {
            Write-Error ("Empty Go source files detected:`n" + ($emptyFiles -join "`n"))
          }

      - name: Validate Go TUI package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Push-Location "ui"
          go build -ldflags "-X main.version=${{ github.ref_name }}" ./cmd/zeri-tui
          Pop-Location

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c
        with:
          arch: amd64

      - name: Setup sccache
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a
        with:
          version: v0.7.7

      - name: Setup ccache
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake ninja-build curl zip unzip tar pkg-config ccache
          else
            brew install cmake ninja ccache
          fi

      - name: Configure vcpkg environment
        shell: pwsh
        run: |
          "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure vcpkg binary cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path "${{ github.workspace }}/.vcpkg-cache" -Force | Out-Null

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          sccache --version

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          ccache --version

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:ZERI_VERSION = "${{ github.ref_name }}"
          .\build.ps1 -Config Release

      - name: Verify Windows dist contents
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $required = @(
            "dist\zeri.exe",
            "dist\zeri-engine.exe",
            "dist\vcruntime140.dll",
            "dist\runtime\runtime_manifest.json",
            "dist\help\help_catalog.json"
          )
          foreach ($f in $required) {
            if (-not (Test-Path $f)) {
              throw "Missing required file in dist: $f"
            }
          }
          Write-Host "dist/ contents verified."

      - name: Run startup smoke tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build-release --output-on-failure -C Release

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath ${{ matrix.archive_name }}

      - name: Build Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export ZERI_VERSION="${{ github.ref_name }}"
          chmod +x build.sh
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export CMAKE_OSX_ARCHITECTURES=arm64
          fi
          ./build.sh Release

      - name: Verify Unix dist contents
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/zeri
          test -f dist/zeri-engine
          test -f dist/runtime/runtime_manifest.json
          test -f dist/help/help_catalog.json

      - name: Run startup smoke tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ctest --test-dir build-release --output-on-failure

      - name: Create Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${{ matrix.archive_name }}" -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload installer scripts
        if: matrix.label == 'linux-amd64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: installer-scripts
          path: |
            install.ps1
            install.sh
          if-no-files-found: error
          retention-days: 14

  install-verify:
    name: Install verify (${{ matrix.label }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            os: ubuntu-latest
          - label: macos-arm64
            os: macos-latest
          - label: windows-amd64
            os: windows-latest
    steps:
      - name: Download Linux artifact
        if: runner.os == 'Linux'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: zeri-linux-amd64
          path: artifact-linux

      - name: Verify Linux archive binary version
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted
          tar -xzf artifact-linux/zeri-linux-amd64.tar.gz -C extracted
          chmod +x extracted/zeri
          version_output="$(./extracted/zeri --version)"
          if [ -z "${version_output// }" ]; then
            echo "::error::zeri --version returned empty output on Linux."
            exit 1
          fi
          echo "$version_output"

      - name: Download macOS artifact
        if: runner.os == 'macOS'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: zeri-macos-arm64
          path: artifact-macos

      - name: Verify macOS archive binary version
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted
          tar -xzf artifact-macos/zeri-macos-arm64.tar.gz -C extracted
          chmod +x extracted/zeri
          version_output="$(./extracted/zeri --version)"
          if [ -z "${version_output// }" ]; then
            echo "::error::zeri --version returned empty output on macOS."
            exit 1
          fi
          echo "$version_output"

      - name: Download Windows artifact
        if: runner.os == 'Windows'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: zeri-windows-amd64
          path: artifact-windows

      - name: Verify Windows archive binary version
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path extracted -Force | Out-Null
          Expand-Archive -Path artifact-windows\zeri-windows-amd64.zip -DestinationPath extracted -Force
          $versionOutput = (& extracted\zeri.exe --version | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($versionOutput)) {
            throw "zeri --version returned empty output on Windows."
          }
          Write-Host $versionOutput

  release:
    needs: [build, install-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093

      - name: Validate release artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f zeri-windows-amd64/zeri-windows-amd64.zip
          test -f zeri-linux-amd64/zeri-linux-amd64.tar.gz
          test -f zeri-macos-arm64/zeri-macos-arm64.tar.gz
          test -f installer-scripts/install.ps1
          test -f installer-scripts/install.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          name: ${{ github.ref_name }}
          files: |
            zeri-windows-amd64/zeri-windows-amd64.zip
            zeri-linux-amd64/zeri-linux-amd64.tar.gz
            zeri-macos-arm64/zeri-macos-arm64.tar.gz
            installer-scripts/install.ps1
            installer-scripts/install.sh
          fail_on_unmatched_files: true
          generate_release_notes: true
