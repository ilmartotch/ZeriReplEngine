name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $env:GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: ui/go.sum

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build Windows
        shell: pwsh
        run: .\build.ps1 -Config Release

      - name: Create Windows archive
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath zeri-windows-amd64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeri-windows-amd64
          path: zeri-windows-amd64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: ui/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build curl zip unzip tar pkg-config

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build Linux
        run: ./build.sh Release

      - name: Create Linux archive
        run: tar -czf zeri-linux-amd64.tar.gz -C dist .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeri-linux-amd64
          path: zeri-linux-amd64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: ui/go.sum

      - name: Install system dependencies
        run: |
          brew install cmake ninja

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build macOS (Apple Silicon)
        env:
          CMAKE_OSX_ARCHITECTURES: arm64
        run: ./build.sh Release

      - name: Create macOS archive
        run: tar -czf zeri-macos-arm64.tar.gz -C dist .

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeri-macos-arm64
          path: zeri-macos-arm64.tar.gz

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            zeri-windows-amd64/zeri-windows-amd64.zip
            zeri-linux-amd64/zeri-linux-amd64.tar.gz
            zeri-macos-arm64/zeri-macos-arm64.tar.gz
          generate_release_notes: true
