name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    name: Build and smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-amd64
            os: windows-latest
            compiler_launcher: sccache
          - label: linux-amd64
            os: ubuntu-latest
            compiler_launcher: ccache
          - label: macos-arm64
            os: macos-latest
            compiler_launcher: ccache
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.compiler_launcher }}
      CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.compiler_launcher }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          fetch-depth: 1
          persist-credentials: false

      - name: Restore vcpkg cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-cache
            ${{ github.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-ci-${{ hashFiles('vcpkg.json', 'CMakeLists.txt', '.gitmodules') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-ci-

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: '1.25.0'
          cache-dependency-path: ui/go.sum

      - name: Validate help catalog encoding and JSON
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $path = Join-Path $env:GITHUB_WORKSPACE "help/help_catalog.json"
          if (-not (Test-Path $path)) {
            throw "Missing required file: $path"
          }

          $bytes = [System.IO.File]::ReadAllBytes($path)
          if ($bytes.Length -eq 0) {
            throw "help/help_catalog.json is empty."
          }

          if ($bytes.Length -ge 2) {
            $isUtf16Le = $bytes[0] -eq 0xFF -and $bytes[1] -eq 0xFE
            $isUtf16Be = $bytes[0] -eq 0xFE -and $bytes[1] -eq 0xFF
            if ($isUtf16Le -or $isUtf16Be) {
              throw "help/help_catalog.json must be UTF-8. UTF-16 BOM detected."
            }
          }

          if ($bytes -contains 0) {
            throw "help/help_catalog.json contains NUL bytes. Expected UTF-8 text JSON."
          }

          $utf8 = [System.Text.UTF8Encoding]::new($false, $true)
          try {
            $text = $utf8.GetString($bytes)
          } catch {
            throw "help/help_catalog.json is not valid UTF-8: $($_.Exception.Message)"
          }

          try {
            $null = $text | ConvertFrom-Json -Depth 100
          } catch {
            throw "help/help_catalog.json is not valid JSON: $($_.Exception.Message)"
          }

      - name: Configure vcpkg environment
        shell: pwsh
        run: |
          "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure vcpkg binary cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path "${{ github.workspace }}/.vcpkg-cache" -Force | Out-Null

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c
        with:
          arch: amd64

      - name: Setup sccache
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a
        with:
          version: v0.7.7

      - name: Setup Unix toolchain
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake ninja-build curl zip unzip tar pkg-config ccache
          else
            brew install cmake ninja ccache
          fi

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Validate Go module
        shell: pwsh
        run: |
          Set-Location ui
          go test ./...
          go vet ./...

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build.ps1 -Config Release

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x build.sh
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export CMAKE_OSX_ARCHITECTURES=arm64
          fi
          ./build.sh Release

      - name: Verify packaged assets
        shell: pwsh
        run: |
          $required = @(
            "dist/help/help_catalog.json",
            "dist/runtime/runtime_manifest.json",
            "dist/runtime/bootstrap_bun.js",
            "dist/runtime/bootstrap_lua.lua",
            "dist/runtime/bootstrap_python.py",
            "dist/runtime/bootstrap_ruby.rb"
          )
          if ($env:RUNNER_OS -eq "Windows") {
            $required += "dist/zeri.exe"
            $required += "dist/zeri-engine.exe"
          } else {
            $required += "dist/zeri"
            $required += "dist/zeri-engine"
          }
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              throw "Missing required packaged asset: $item"
            }
          }

      - name: Run startup smoke tests
        shell: pwsh
        run: ctest --test-dir build-release --output-on-failure -C Release

  static-analysis:
    name: Static analysis (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          fetch-depth: 1
          persist-credentials: false

      - name: Install analysis toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        shell: bash
        run: |
          set -euo pipefail
          cppcheck \
            --enable=warning,portability \
            --std=c++20 \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -i src/Tests \
            src

  sanitizers:
    name: Sanitizers (Linux, ${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan-ubsan, tsan]
    env:
      VCPKG_FEATURE_FLAGS: manifests
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          fetch-depth: 1
          persist-credentials: false

      - name: Install toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld cmake ninja-build curl zip unzip tar pkg-config build-essential
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure and build smoke target with sanitizers
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.sanitizer }}" == "asan-ubsan" ]]; then
            SAN_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
            LINK_FLAGS="-fsanitize=address,undefined"
          else
            SAN_FLAGS="-fsanitize=thread -fno-omit-frame-pointer"
            LINK_FLAGS="-fsanitize=thread"
          fi

          cmake --fresh -S . -B build-sanitize -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="$SAN_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$LINK_FLAGS"

          cmake --build build-sanitize --target zeri_help_catalog_smoke

      - name: Run sanitizer smoke tests
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build-sanitize --output-on-failure -R "helpcatalog-"
